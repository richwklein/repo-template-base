name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 4 * * 1" # weekly, Monday 04:23 UTC

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            workflows:
              - '.github/workflows/**'

  analyze:
    needs: changes
    name: analyze
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        # Override per-repo: each `include` entry is (language, runner).
        # 'actions' analyzes the workflow YAML itself and is always safe.
        #
        # Common (language, runner) pairings:
        #   actions, javascript-typescript, python, ruby, go,
        #   csharp, java-kotlin, c-cpp  -> ubuntu-latest
        #   swift                       -> macos-latest
        #     (Swift extractor only runs on macOS)
        #
        # PATH FILTERS: When adding a language entry here, also add its
        # source paths to the `changes` job filter above so the analyze
        # job runs when those files change. Examples:
        #   javascript-typescript / python / ruby / go -> 'src/**'
        #   swift / c-cpp / java-kotlin / csharp       -> 'Sources/**' or 'src/**'
        #
        # COMPILED LANGUAGES (swift, c-cpp, java-kotlin, csharp) require a
        # build step BEFORE 'Perform CodeQL analysis' so the extractor can
        # observe source compilation. Example for Swift:
        #
        #   - name: Build (Swift)
        #     if: matrix.language == 'swift'
        #     run: |
        #       sudo xcode-select -s /Applications/Xcode_16.3.app
        #       xcodebuild build -project Your.xcodeproj -scheme Your \
        #         -configuration Debug -destination 'platform=macOS' \
        #         CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
        #
        # Each include entry registers its own status check, named
        # `analyze (<language>, <runner>)`. Update branch protection
        # rulesets to require those exact contexts.
        include:
          - language: actions
            runner: ubuntu-latest
    steps:
      # Steps are conditionally skipped rather than the job, so the
      # matrix-expanded status check (e.g. "analyze (actions, ubuntu-latest)")
      # is always registered. A job-level skip leaves that check unreported,
      # which blocks PRs that require it.
      - name: Checkout
        if: needs.changes.outputs.relevant == 'true' || github.event_name == 'schedule'
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        if: needs.changes.outputs.relevant == 'true' || github.event_name == 'schedule'
        uses: github/codeql-action/init@v4.36.0
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL analysis
        if: needs.changes.outputs.relevant == 'true' || github.event_name == 'schedule'
        uses: github/codeql-action/analyze@v4.36.0
        with:
          category: "/language:${{ matrix.language }}"
